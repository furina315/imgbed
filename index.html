<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Image Bed</title>
  <meta name="description" content="Hoshino Shio's Image Bed">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap');

    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg-primary: #0d1117;
      --bg-secondary: #161b22;
      --bg-card: #1c2128;
      --border: #30363d;
      --text-primary: #e6edf3;
      --text-secondary: #8b949e;
      --text-muted: #6e7681;
      --accent: #58a6ff;
      --accent-glow: rgba(88, 166, 255, 0.15);
      --green: #3fb950;
      --purple: #a371f7;
      --radius: 12px;
      --radius-sm: 8px;
      --transition: 0.2s cubic-bezier(0.4, 0, 0.2, 1);
      --sidebar-w: 250px;
    }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      background: var(--bg-primary);
      color: var(--text-primary);
      min-height: 100vh;
      line-height: 1.5;
    }

    /* ── Header ──────────────────────────── */
    .header {
      position: sticky; top: 0; z-index: 100;
      background: rgba(13, 17, 23, 0.85);
      backdrop-filter: blur(16px) saturate(180%);
      -webkit-backdrop-filter: blur(16px) saturate(180%);
      border-bottom: 1px solid var(--border);
      padding: 14px 0;
    }
    .header-inner {
      max-width: 1440px; margin: 0 auto; padding: 0 24px;
      display: flex; align-items: center; justify-content: space-between;
      gap: 16px; flex-wrap: wrap;
    }
    .header-left { display: flex; align-items: center; gap: 10px; }
    .logo {
      display: flex; align-items: center; gap: 10px;
      font-size: 18px; font-weight: 600; letter-spacing: -0.02em;
      color: var(--text-primary); text-decoration: none;
    }
    .logo-icon {
      width: 32px; height: 32px; border-radius: var(--radius-sm);
      background: linear-gradient(135deg, var(--accent), var(--purple));
      display: flex; align-items: center; justify-content: center; font-size: 16px;
    }
    .header-right { display: flex; align-items: center; gap: 12px; flex-wrap: wrap; }
    .search-box { position: relative; }
    .search-box input {
      background: var(--bg-secondary); border: 1px solid var(--border);
      border-radius: var(--radius-sm); padding: 8px 12px 8px 36px;
      color: var(--text-primary); font-family: inherit; font-size: 14px;
      width: 220px; outline: none;
      transition: border-color var(--transition), box-shadow var(--transition);
    }
    .search-box input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-glow); }
    .search-box input::placeholder { color: var(--text-muted); }
    .search-box svg {
      position: absolute; left: 10px; top: 50%; transform: translateY(-50%);
      color: var(--text-muted); pointer-events: none;
    }
    .stat-badge {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 6px 12px; background: var(--bg-secondary);
      border: 1px solid var(--border); border-radius: 20px;
      font-size: 13px; color: var(--text-secondary); font-weight: 500;
    }
    .stat-badge .count { color: var(--accent); font-weight: 600; }

    /* ── Layout ──────────────────────────── */
    .layout { display: flex; max-width: 1440px; margin: 0 auto; min-height: calc(100vh - 60px); }

    /* ── Sidebar ─────────────────────────── */
    .sidebar {
      width: var(--sidebar-w); flex-shrink: 0;
      border-right: 1px solid var(--border);
      padding: 16px 0; position: sticky; top: 58px;
      height: calc(100vh - 58px); overflow-y: auto; background: var(--bg-primary);
    }
    .sidebar::-webkit-scrollbar { width: 4px; }
    .sidebar::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }
    .sidebar-title {
      padding: 0 16px 12px; font-size: 11px; font-weight: 600;
      text-transform: uppercase; letter-spacing: 0.08em; color: var(--text-muted);
    }
    .dir-tree { list-style: none; }
    .dir-link {
      display: flex; align-items: center; gap: 8px;
      padding: 7px 16px; font-size: 13px; color: var(--text-secondary);
      cursor: pointer; border-left: 2px solid transparent;
      transition: all var(--transition); user-select: none;
    }
    .dir-link:hover { background: var(--bg-secondary); color: var(--text-primary); }
    .dir-link.active { color: var(--accent); border-left-color: var(--accent); background: var(--accent-glow); }
    .dir-link .dir-icon { font-size: 14px; flex-shrink: 0; width: 18px; text-align: center; }
    .dir-link .dir-name {
      flex: 1; min-width: 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .dir-link .dir-count {
      font-size: 11px; padding: 1px 7px; background: var(--bg-card);
      border-radius: 10px; color: var(--text-muted); flex-shrink: 0;
    }
    .dir-link.active .dir-count { background: rgba(88,166,255,0.2); color: var(--accent); }
    .dir-link-all { margin-bottom: 4px; border-bottom: 1px solid var(--border); padding-bottom: 11px; }

    /* ── Main ────────────────────────────── */
    .main-content { flex: 1; min-width: 0; padding: 24px; }

    /* ── Folder Section ──────────────────── */
    .folder-section { margin-bottom: 28px; }
    .folder-header {
      display: flex; align-items: center; gap: 10px;
      padding: 10px 14px; background: var(--bg-secondary);
      border: 1px solid var(--border); border-radius: var(--radius-sm);
      cursor: pointer; user-select: none; margin-bottom: 14px;
      transition: border-color var(--transition), background var(--transition);
    }
    .folder-header:hover { border-color: var(--accent); background: var(--bg-card); }
    .folder-header .chevron {
      font-size: 12px; color: var(--text-muted);
      transition: transform 0.25s ease; flex-shrink: 0;
    }
    .folder-header.collapsed .chevron { transform: rotate(-90deg); }
    .folder-header .folder-icon { font-size: 16px; flex-shrink: 0; }
    .folder-header .folder-path { font-size: 14px; font-weight: 500; color: var(--text-primary); flex: 1; min-width: 0; }
    .folder-header .folder-count {
      font-size: 12px; padding: 2px 10px; background: var(--bg-primary);
      border-radius: 10px; color: var(--text-muted); flex-shrink: 0;
    }
    .folder-grid {
      display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 14px; overflow: hidden; transition: max-height 0.35s ease, opacity 0.25s ease;
    }
    .folder-grid.collapsed { max-height: 0 !important; opacity: 0; margin-top: 0; }

    /* ── Card ────────────────────────────── */
    .card {
      background: var(--bg-card); border: 1px solid var(--border);
      border-radius: var(--radius); overflow: hidden; cursor: pointer;
      transition: transform var(--transition), border-color var(--transition), box-shadow var(--transition);
      animation: fadeUp 0.4s ease both;
    }
    .card:hover { transform: translateY(-2px); border-color: var(--accent); box-shadow: 0 4px 20px var(--accent-glow); }
    .card-img-wrapper {
      position: relative; width: 100%; padding-top: 75%;
      background: var(--bg-secondary); overflow: hidden;
    }
    .card-img-wrapper img {
      position: absolute; inset: 0; width: 100%; height: 100%;
      object-fit: cover; transition: transform 0.3s ease;
    }
    .card:hover .card-img-wrapper img { transform: scale(1.05); }
    .card-body {
      padding: 10px 12px; display: flex; align-items: center;
      justify-content: space-between; gap: 6px;
    }
    .card-name {
      font-size: 12px; color: var(--text-secondary);
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
      flex: 1; min-width: 0;
    }
    .card-actions { display: flex; gap: 2px; flex-shrink: 0; }
    .btn-icon {
      width: 28px; height: 28px; border-radius: 6px; border: none;
      background: transparent; color: var(--text-muted); cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: background var(--transition), color var(--transition);
    }
    .btn-icon:hover { background: var(--bg-secondary); color: var(--accent); }
    .btn-icon.copied { color: var(--green); }

    /* ── Lightbox ─────────────────────────── */
    .lightbox {
      position: fixed; inset: 0; z-index: 1000;
      background: rgba(0,0,0,0.88); backdrop-filter: blur(24px);
      display: flex; align-items: center; justify-content: center;
      opacity: 0; visibility: hidden; transition: opacity 0.3s ease, visibility 0.3s ease;
    }
    .lightbox.active { opacity: 1; visibility: visible; }
    .lightbox img {
      max-width: 92vw; max-height: 86vh; object-fit: contain;
      border-radius: var(--radius); box-shadow: 0 8px 32px rgba(0,0,0,0.3);
      transform: scale(0.92); transition: transform 0.3s cubic-bezier(0.4,0,0.2,1);
    }
    .lightbox.active img { transform: scale(1); }
    .lightbox-close {
      position: absolute; top: 20px; right: 24px; width: 40px; height: 40px;
      border-radius: 50%; border: 1px solid rgba(255,255,255,0.15);
      background: rgba(255,255,255,0.08); color: #fff; font-size: 20px;
      cursor: pointer; display: flex; align-items: center; justify-content: center;
      transition: background var(--transition);
    }
    .lightbox-close:hover { background: rgba(255,255,255,0.18); }
    .lightbox-info {
      position: absolute; bottom: 24px; left: 50%; transform: translateX(-50%);
      display: flex; align-items: center; gap: 12px;
      background: rgba(22,27,34,0.92); border: 1px solid var(--border);
      border-radius: var(--radius-sm); padding: 10px 16px;
      backdrop-filter: blur(12px); max-width: 90vw;
    }
    .lightbox-info .filename {
      font-size: 13px; color: var(--text-primary); font-weight: 500;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .lightbox-info .btn-copy-url {
      padding: 6px 12px; border-radius: 6px; border: 1px solid var(--border);
      background: var(--bg-card); color: var(--text-secondary);
      font-size: 12px; font-family: inherit; cursor: pointer;
      transition: all var(--transition); white-space: nowrap;
    }
    .lightbox-info .btn-copy-url:hover { border-color: var(--accent); color: var(--accent); }
    .lightbox-info .btn-copy-url.copied { border-color: var(--green); color: var(--green); }
    .lightbox-nav {
      position: absolute; top: 50%; transform: translateY(-50%);
      width: 44px; height: 44px; border-radius: 50%;
      border: 1px solid rgba(255,255,255,0.12); background: rgba(255,255,255,0.06);
      color: #fff; font-size: 18px; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: background var(--transition);
    }
    .lightbox-nav:hover { background: rgba(255,255,255,0.15); }
    .lightbox-nav.prev { left: 20px; }
    .lightbox-nav.next { right: 20px; }

    /* ── States ──────────────────────────── */
    .empty-state { text-align: center; padding: 80px 24px; color: var(--text-muted); }
    .empty-state .icon { font-size: 48px; margin-bottom: 16px; opacity: 0.5; }
    .empty-state h2 { font-size: 18px; font-weight: 500; color: var(--text-secondary); margin-bottom: 8px; }
    .empty-state p { font-size: 14px; max-width: 420px; margin: 0 auto; line-height: 1.6; }
    .loading { text-align: center; padding: 80px 24px; }
    .spinner {
      width: 36px; height: 36px; border: 3px solid var(--border);
      border-top-color: var(--accent); border-radius: 50%;
      animation: spin 0.8s linear infinite; margin: 0 auto 16px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .loading p { font-size: 14px; color: var(--text-muted); }

    /* ── Toast ───────────────────────────── */
    .toast {
      position: fixed; bottom: 24px; left: 50%;
      transform: translateX(-50%) translateY(80px);
      background: var(--bg-card); border: 1px solid var(--green); color: var(--green);
      padding: 10px 20px; border-radius: var(--radius-sm);
      font-size: 14px; font-weight: 500; box-shadow: 0 8px 24px rgba(0,0,0,0.4);
      transition: transform 0.3s ease; z-index: 2000; pointer-events: none;
    }
    .toast.show { transform: translateX(-50%) translateY(0); }

    /* ── Mobile ──────────────────────────── */
    .sidebar-toggle {
      display: none; width: 36px; height: 36px;
      border-radius: var(--radius-sm); border: 1px solid var(--border);
      background: var(--bg-secondary); color: var(--text-secondary);
      font-size: 18px; cursor: pointer; align-items: center; justify-content: center;
    }
    .sidebar-overlay {
      position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 199;
      opacity: 0; visibility: hidden; transition: opacity 0.3s ease, visibility 0.3s ease;
    }
    .sidebar-overlay.show { opacity: 1; visibility: visible; }

    @media (max-width: 860px) {
      .sidebar-toggle { display: flex; }
      .sidebar {
        position: fixed; top: 0; left: 0; height: 100vh; z-index: 200;
        transform: translateX(-100%); transition: transform 0.3s ease; box-shadow: none;
      }
      .sidebar.open { transform: translateX(0); box-shadow: 4px 0 24px rgba(0,0,0,0.5); }
      .folder-grid { grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 10px; }
      .lightbox-nav { display: none; }
    }
    @media (max-width: 480px) {
      .search-box input { width: 140px; font-size: 13px; }
      .folder-grid { grid-template-columns: repeat(auto-fill, minmax(130px, 1fr)); }
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(12px); }
      to   { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>

  <header class="header">
    <div class="header-inner">
      <div class="header-left">
        <button class="sidebar-toggle" id="sidebarToggle" title="目录">☰</button>
        <a class="logo" href="./">
          <span class="logo-icon">🖼</span>
          <span>Image Bed</span>
        </a>
      </div>
      <div class="header-right">
        <div class="search-box">
          <svg width="15" height="15" viewBox="0 0 16 16" fill="currentColor"><path d="M11.5 7a4.5 4.5 0 1 1-9 0 4.5 4.5 0 0 1 9 0Zm-.82 4.74a6 6 0 1 1 1.06-1.06l3.04 3.04a.75.75 0 1 1-1.06 1.06l-3.04-3.04Z"/></svg>
          <input type="text" id="searchInput" placeholder="搜索图片…" autocomplete="off">
        </div>
        <span class="stat-badge">
          <span class="count" id="imageCount">0</span> 张图片
        </span>
      </div>
    </div>
  </header>

  <div class="sidebar-overlay" id="sidebarOverlay"></div>

  <div class="layout">
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-title">📁 目录</div>
      <ul class="dir-tree" id="dirTree"></ul>
    </aside>
    <main class="main-content" id="mainContent">
      <div id="loading" class="loading" style="display:none">
        <div class="spinner"></div>
        <p>正在扫描仓库图片…</p>
      </div>
      <div id="empty" class="empty-state" style="display:none">
        <div class="icon">📭</div>
        <h2 id="emptyTitle">没有找到图片</h2>
        <p id="emptyDesc">仓库中暂无图片文件，上传一些图片后刷新页面即可。</p>
      </div>
    </main>
  </div>

  <div class="lightbox" id="lightbox">
    <button class="lightbox-close" id="lightboxClose" title="关闭">✕</button>
    <button class="lightbox-nav prev" id="lightboxPrev" title="上一张">‹</button>
    <button class="lightbox-nav next" id="lightboxNext" title="下一张">›</button>
    <img id="lightboxImg" src="" alt="">
    <div class="lightbox-info">
      <span class="filename" id="lightboxName"></span>
      <button class="btn-copy-url" id="lightboxCopy">复制链接</button>
      <button class="btn-copy-url" id="lightboxCopyMd">复制 MD</button>
    </div>
  </div>

  <div class="toast" id="toast">已复制到剪贴板 ✓</div>

  <script>
    (() => {
      /* ════════════════════════════════════════════════
       *  ↓↓↓ 只需改这里：填上你的 GitHub 用户名和仓库名 ↓↓↓
       * ════════════════════════════════════════════════ */
      const OWNER = 'furina315';   // ← 你的 GitHub 用户名
      const REPO  = 'imgbed';     // ← 你的仓库名
      /* ════════════════════════════════════════════════ */

      const REPO_FULL = `${OWNER}/${REPO}`;

      // ── Constants ──
      const IMG_EXTS = /\.(png|jpe?g|gif|webp|svg|bmp|ico|avif)$/i;
      const IGNORE = /^(\.|_|node_modules)/; // 忽略隐藏/系统目录

      // ── State ──
      let images = [], grouped = {}, dirList = [], filtered = [];
      let currentIndex = -1, activeDir = null;

      // ── DOM ──
      const $ = id => document.getElementById(id);
      const mainContent = $('mainContent'), loading = $('loading'), empty = $('empty');
      const searchInput = $('searchInput'), imageCount = $('imageCount');
      const dirTree = $('dirTree'), lightbox = $('lightbox');
      const lightboxImg = $('lightboxImg'), lightboxName = $('lightboxName');
      const toast = $('toast'), sidebar = $('sidebar');

      // ── Mobile sidebar ──
      $('sidebarToggle').addEventListener('click', () => {
        sidebar.classList.toggle('open');
        $('sidebarOverlay').classList.toggle('show');
      });
      $('sidebarOverlay').addEventListener('click', () => {
        sidebar.classList.remove('open');
        $('sidebarOverlay').classList.remove('show');
      });

      // ── Init ──
      loadImages(REPO_FULL);

      // ── Fetch ──
      async function loadImages(repo) {
        clearGallery();
        loading.style.display = '';
        empty.style.display = 'none';

        try {
          let data;
          const r1 = await fetch(`https://api.github.com/repos/${repo}/git/trees/main?recursive=1`);
          if (r1.ok) { data = await r1.json(); }
          else {
            const r2 = await fetch(`https://api.github.com/repos/${repo}/git/trees/master?recursive=1`);
            if (!r2.ok) throw new Error('仓库不存在或无权访问');
            data = await r2.json();
          }
          processTree(data, repo);
        } catch (err) {
          loading.style.display = 'none';
          empty.style.display = '';
          $('emptyTitle').textContent = '加载失败';
          $('emptyDesc').textContent = err.message;
        }
      }

      function processTree(data, repo) {
        const files = (data.tree || []).filter(f => {
          if (f.type !== 'blob' || !IMG_EXTS.test(f.path)) return false;
          // 忽略以 . 或 _ 开头的目录/文件
          return !f.path.split('/').some(seg => IGNORE.test(seg));
        });

        images = files.map(f => {
          const parts = f.path.split('/');
          const dir = parts.length > 1 ? parts.slice(0, -1).join('/') : '/';
          return {
            name: parts[parts.length - 1],
            path: f.path, dir,
            url: `https://raw.githubusercontent.com/${repo}/main/${encodeURIComponent(f.path).replace(/%2F/g, '/')}`,
            cdn: `https://cdn.jsdelivr.net/gh/${repo}@main/${f.path}`
          };
        });

        loading.style.display = 'none';
        if (images.length === 0) { empty.style.display = ''; return; }

        buildGroups(images);
        buildSidebar();
        activeDir = null;
        renderGallery();
      }

      function buildGroups(imgs) {
        grouped = {};
        imgs.forEach(img => {
          if (!grouped[img.dir]) grouped[img.dir] = [];
          grouped[img.dir].push(img);
        });
        dirList = Object.keys(grouped).sort((a, b) => {
          if (a === '/') return -1;
          if (b === '/') return 1;
          return a.localeCompare(b);
        });
      }

      // ── Sidebar ──
      function buildSidebar() {
        dirTree.innerHTML = '';
        // "All"
        const allLi = document.createElement('li');
        allLi.innerHTML = `<div class="dir-link dir-link-all active" data-dir="__all__">
          <span class="dir-icon">🗂</span><span class="dir-name">全部图片</span>
          <span class="dir-count">${images.length}</span></div>`;
        dirTree.appendChild(allLi);

        dirList.forEach(dir => {
          const li = document.createElement('li');
          li.innerHTML = `<div class="dir-link" data-dir="${dir}">
            <span class="dir-icon">${dir === '/' ? '📄' : '📁'}</span>
            <span class="dir-name">${dir === '/' ? '根目录' : dir}</span>
            <span class="dir-count">${grouped[dir].length}</span></div>`;
          dirTree.appendChild(li);
        });

        dirTree.addEventListener('click', e => {
          const link = e.target.closest('.dir-link');
          if (!link) return;
          dirTree.querySelectorAll('.dir-link').forEach(l => l.classList.remove('active'));
          link.classList.add('active');
          activeDir = link.dataset.dir === '__all__' ? null : link.dataset.dir;
          searchInput.value = '';
          renderGallery();
          sidebar.classList.remove('open');
          $('sidebarOverlay').classList.remove('show');
        });
      }

      // ── Render ──
      function clearGallery() {
        mainContent.querySelectorAll('.folder-section').forEach(el => el.remove());
      }

      function renderGallery() {
        clearGallery();
        const q = searchInput.value.toLowerCase().trim();
        const dirsToRender = activeDir ? [activeDir] : dirList;
        filtered = [];
        let totalShown = 0;
        const frag = document.createDocumentFragment();

        dirsToRender.forEach(dir => {
          let imgs = grouped[dir] || [];
          if (q) imgs = imgs.filter(img => img.path.toLowerCase().includes(q));
          if (!imgs.length) return;

          totalShown += imgs.length;
          const startIdx = filtered.length;
          filtered.push(...imgs);

          const sec = document.createElement('div');
          sec.className = 'folder-section';

          const hdr = document.createElement('div');
          hdr.className = 'folder-header';
          hdr.innerHTML = `<span class="chevron">▼</span>
            <span class="folder-icon">${dir === '/' ? '📄' : '📁'}</span>
            <span class="folder-path">${dir === '/' ? '根目录' : dir}</span>
            <span class="folder-count">${imgs.length} 张</span>`;

          const grid = document.createElement('div');
          grid.className = 'folder-grid';

          imgs.forEach((img, i) => {
            const gi = startIdx + i;
            const card = document.createElement('div');
            card.className = 'card';
            card.style.animationDelay = `${Math.min(i * 30, 500)}ms`;
            card.innerHTML = `<div class="card-img-wrapper">
                <img src="${img.cdn}" alt="${img.name}" loading="lazy"
                     onerror="this.onerror=null;this.src='${img.url}'">
              </div>
              <div class="card-body">
                <span class="card-name" title="${img.path}">${img.name}</span>
                <div class="card-actions">
                  <button class="btn-icon" data-act="link" data-url="${img.cdn}" title="复制链接">
                    <svg width="13" height="13" viewBox="0 0 16 16" fill="currentColor"><path d="M0 6.75C0 5.784.784 5 1.75 5h1.5a.75.75 0 0 1 0 1.5h-1.5a.25.25 0 0 0-.25.25v7.5c0 .138.112.25.25.25h7.5a.25.25 0 0 0 .25-.25v-1.5a.75.75 0 0 1 1.5 0v1.5A1.75 1.75 0 0 1 9.25 16h-7.5A1.75 1.75 0 0 1 0 14.25Z"/><path d="M5 1.75C5 .784 5.784 0 6.75 0h7.5C15.216 0 16 .784 16 1.75v7.5A1.75 1.75 0 0 1 14.25 11h-7.5A1.75 1.75 0 0 1 5 9.25Zm1.75-.25a.25.25 0 0 0-.25.25v7.5c0 .138.112.25.25.25h7.5a.25.25 0 0 0 .25-.25v-7.5a.25.25 0 0 0-.25-.25Z"/></svg>
                  </button>
                  <button class="btn-icon" data-act="md" data-url="${img.cdn}" data-name="${img.name}" title="复制 Markdown">
                    <svg width="13" height="13" viewBox="0 0 16 16" fill="currentColor"><path d="M14.85 3H1.15C.52 3 0 3.52 0 4.15v7.69C0 12.48.52 13 1.15 13h13.69c.64 0 1.15-.52 1.15-1.15V4.15C16 3.52 15.48 3 14.85 3ZM9 11H7V8L5.5 9.92 4 8v3H2V5h2l1.5 2L7 5h2Zm2.99.5L9.5 8H11V5h2v3h1.5Z"/></svg>
                  </button>
                </div>
              </div>`;

            card.querySelector('.card-img-wrapper').addEventListener('click', () => openLightbox(gi));
            card.querySelectorAll('[data-act]').forEach(btn => {
              btn.addEventListener('click', e => {
                e.stopPropagation();
                const txt = btn.dataset.act === 'md'
                  ? `![${btn.dataset.name}](${btn.dataset.url})`
                  : btn.dataset.url;
                copyToClipboard(txt);
                btn.classList.add('copied');
                setTimeout(() => btn.classList.remove('copied'), 1500);
              });
            });
            grid.appendChild(card);
          });

          hdr.addEventListener('click', () => {
            hdr.classList.toggle('collapsed');
            grid.classList.toggle('collapsed');
          });

          sec.appendChild(hdr);
          sec.appendChild(grid);
          frag.appendChild(sec);
        });

        imageCount.textContent = totalShown;
        if (totalShown === 0) {
          empty.style.display = '';
          $('emptyTitle').textContent = q ? '没有匹配的图片' : '没有找到图片';
        } else {
          empty.style.display = 'none';
        }
        mainContent.insertBefore(frag, loading);
      }

      // ── Search ──
      searchInput.addEventListener('input', () => renderGallery());

      // ── Lightbox ──
      function openLightbox(idx) {
        currentIndex = idx;
        const img = filtered[idx];
        lightboxImg.src = img.cdn;
        lightboxImg.onerror = function () { this.onerror = null; this.src = img.url; };
        lightboxName.textContent = img.path;
        lightbox.classList.add('active');
        document.body.style.overflow = 'hidden';
      }
      function closeLightbox() {
        lightbox.classList.remove('active');
        document.body.style.overflow = '';
        setTimeout(() => { lightboxImg.src = ''; }, 300);
      }
      function navLB(d) {
        if (!filtered.length) return;
        currentIndex = (currentIndex + d + filtered.length) % filtered.length;
        const img = filtered[currentIndex];
        lightboxImg.src = img.cdn;
        lightboxImg.onerror = function () { this.onerror = null; this.src = img.url; };
        lightboxName.textContent = img.path;
      }

      $('lightboxClose').addEventListener('click', closeLightbox);
      $('lightboxPrev').addEventListener('click', () => navLB(-1));
      $('lightboxNext').addEventListener('click', () => navLB(1));
      $('lightboxCopy').addEventListener('click', () => {
        copyToClipboard(filtered[currentIndex].cdn);
        flashBtn($('lightboxCopy'), '已复制 ✓', '复制链接');
      });
      $('lightboxCopyMd').addEventListener('click', () => {
        const img = filtered[currentIndex];
        copyToClipboard(`![${img.name}](${img.cdn})`);
        flashBtn($('lightboxCopyMd'), '已复制 ✓', '复制 MD');
      });
      lightbox.addEventListener('click', e => { if (e.target === lightbox) closeLightbox(); });
      document.addEventListener('keydown', e => {
        if (!lightbox.classList.contains('active')) return;
        if (e.key === 'Escape') closeLightbox();
        if (e.key === 'ArrowLeft') navLB(-1);
        if (e.key === 'ArrowRight') navLB(1);
      });

      // ── Utils ──
      function copyToClipboard(t) { navigator.clipboard.writeText(t).then(() => showToast()); }
      function showToast() { toast.classList.add('show'); setTimeout(() => toast.classList.remove('show'), 2000); }
      function flashBtn(btn, t1, t2) {
        btn.textContent = t1; btn.classList.add('copied');
        setTimeout(() => { btn.textContent = t2; btn.classList.remove('copied'); }, 1500);
      }
    })();
  </script>
</body>
</html>

<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Image Bed</title>
  <meta name="description" content="Hoshino Shio's Image Bed">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap');
    *,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
    :root{
      --bg:#0d1117;--bg2:#161b22;--bg3:#1c2128;
      --border:#30363d;--text:#e6edf3;--text2:#8b949e;--text3:#6e7681;
      --accent:#58a6ff;--accent-g:rgba(88,166,255,.15);
      --green:#3fb950;--purple:#a371f7;--yellow:#d29922;
      --r:12px;--rs:8px;--t:.2s cubic-bezier(.4,0,.2,1);
    }
    body{font-family:'Inter',-apple-system,BlinkMacSystemFont,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;line-height:1.5}

    /* ── Header ── */
    .header{position:sticky;top:0;z-index:100;background:rgba(13,17,23,.85);backdrop-filter:blur(16px) saturate(180%);-webkit-backdrop-filter:blur(16px) saturate(180%);border-bottom:1px solid var(--border);padding:12px 0}
    .header-inner{max-width:1100px;margin:0 auto;padding:0 24px;display:flex;align-items:center;justify-content:space-between;gap:16px}
    .logo{display:flex;align-items:center;gap:10px;font-size:18px;font-weight:600;letter-spacing:-.02em;color:var(--text);text-decoration:none}
    .logo-icon{width:30px;height:30px;border-radius:var(--rs);background:linear-gradient(135deg,var(--accent),var(--purple));display:flex;align-items:center;justify-content:center;font-size:15px}
    .stat{font-size:13px;color:var(--text3)}
    .stat b{color:var(--accent);font-weight:600}

    /* ── Breadcrumb ── */
    .breadcrumb{max-width:1100px;margin:0 auto;padding:16px 24px 0;display:flex;align-items:center;gap:6px;flex-wrap:wrap;font-size:14px}
    .bc-item{color:var(--accent);cursor:pointer;padding:4px 8px;border-radius:6px;transition:background var(--t);text-decoration:none;font-weight:500}
    .bc-item:hover{background:var(--accent-g)}
    .bc-item.current{color:var(--text);cursor:default;font-weight:600}
    .bc-item.current:hover{background:transparent}
    .bc-sep{color:var(--text3);font-size:12px;user-select:none}

    /* ── Content ── */
    .content{max-width:1100px;margin:0 auto;padding:20px 24px 40px}

    /* ── Folder list ── */
    .folder-list{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:12px;margin-bottom:20px}
    .folder-card{
      display:flex;align-items:center;gap:10px;padding:14px 16px;
      background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);
      cursor:pointer;transition:all var(--t);text-decoration:none;color:var(--text)
    }
    .folder-card:hover{border-color:var(--yellow);background:var(--bg3);transform:translateY(-1px);box-shadow:0 4px 16px rgba(210,153,34,.1)}
    .folder-card .f-icon{font-size:22px;flex-shrink:0}
    .folder-card .f-info{min-width:0;flex:1}
    .folder-card .f-name{font-size:14px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .folder-card .f-count{font-size:12px;color:var(--text3);margin-top:1px}

    /* ── Image grid ── */
    .image-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:14px}
    .img-card{
      background:var(--bg3);border:1px solid var(--border);border-radius:var(--r);
      overflow:hidden;cursor:pointer;transition:all var(--t);animation:fadeUp .4s ease both
    }
    .img-card:hover{transform:translateY(-2px);border-color:var(--accent);box-shadow:0 4px 20px var(--accent-g)}
    .img-card .thumb{position:relative;width:100%;padding-top:75%;background:var(--bg2);overflow:hidden}
    .img-card .thumb img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;transition:transform .3s ease}
    .img-card:hover .thumb img{transform:scale(1.05)}
    .img-card .info{padding:10px 12px;display:flex;align-items:center;gap:6px}
    .img-card .name{font-size:12px;color:var(--text2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;flex:1;min-width:0}
    .img-card .acts{display:flex;gap:2px;flex-shrink:0}
    .btn-i{width:28px;height:28px;border-radius:6px;border:none;background:transparent;color:var(--text3);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:background var(--t),color var(--t)}
    .btn-i:hover{background:var(--bg2);color:var(--accent)}
    .btn-i.copied{color:var(--green)}

    /* ── Lightbox ── */
    .lb{position:fixed;inset:0;z-index:1000;background:rgba(0,0,0,.9);backdrop-filter:blur(24px);display:flex;align-items:center;justify-content:center;opacity:0;visibility:hidden;transition:opacity .3s,visibility .3s}
    .lb.active{opacity:1;visibility:visible}
    .lb img{max-width:92vw;max-height:86vh;object-fit:contain;border-radius:var(--r);box-shadow:0 8px 32px rgba(0,0,0,.3);transform:scale(.92);transition:transform .3s cubic-bezier(.4,0,.2,1)}
    .lb.active img{transform:scale(1)}
    .lb-close{position:absolute;top:20px;right:24px;width:40px;height:40px;border-radius:50%;border:1px solid rgba(255,255,255,.15);background:rgba(255,255,255,.08);color:#fff;font-size:20px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:background var(--t)}
    .lb-close:hover{background:rgba(255,255,255,.18)}
    .lb-bar{position:absolute;bottom:24px;left:50%;transform:translateX(-50%);display:flex;align-items:center;gap:10px;background:rgba(22,27,34,.92);border:1px solid var(--border);border-radius:var(--rs);padding:10px 16px;backdrop-filter:blur(12px);max-width:92vw}
    .lb-bar .fname{font-size:13px;color:var(--text);font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:200px}
    .lb-bar .lb-url{font-size:11px;color:var(--text3);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:280px;padding:4px 8px;background:var(--bg);border-radius:4px;font-family:'Consolas','Monaco',monospace}
    .lb-btn{padding:6px 12px;border-radius:6px;border:1px solid var(--border);background:var(--bg3);color:var(--text2);font-size:12px;font-family:inherit;cursor:pointer;transition:all var(--t);white-space:nowrap}
    .lb-btn:hover{border-color:var(--accent);color:var(--accent)}
    .lb-btn.copied{border-color:var(--green);color:var(--green)}
    .lb-nav{position:absolute;top:50%;transform:translateY(-50%);width:44px;height:44px;border-radius:50%;border:1px solid rgba(255,255,255,.12);background:rgba(255,255,255,.06);color:#fff;font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:background var(--t)}
    .lb-nav:hover{background:rgba(255,255,255,.15)}
    .lb-nav.prev{left:20px}
    .lb-nav.next{right:20px}

    /* ── States ── */
    .empty{text-align:center;padding:80px 24px;color:var(--text3)}
    .empty .icon{font-size:48px;margin-bottom:16px;opacity:.5}
    .empty h2{font-size:18px;font-weight:500;color:var(--text2);margin-bottom:8px}
    .empty p{font-size:14px;max-width:420px;margin:0 auto;line-height:1.6}
    .loading{text-align:center;padding:80px 24px}
    .spinner{width:36px;height:36px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 16px}
    @keyframes spin{to{transform:rotate(360deg)}}
    .loading p{font-size:14px;color:var(--text3)}

    /* ── Toast ── */
    .toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(80px);background:var(--bg3);border:1px solid var(--green);color:var(--green);padding:10px 20px;border-radius:var(--rs);font-size:14px;font-weight:500;box-shadow:0 8px 24px rgba(0,0,0,.4);transition:transform .3s;z-index:2000;pointer-events:none}
    .toast.show{transform:translateX(-50%) translateY(0)}

    /* ── Responsive ── */
    @media(max-width:640px){
      .folder-list{grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:8px}
      .image-grid{grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:10px}
      .content{padding:16px}
      .lb-nav{display:none}
      .lb-bar{flex-wrap:wrap;justify-content:center}
    }
    @keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
  </style>
</head>
<body>

  <header class="header">
    <div class="header-inner">
      <a class="logo" href="#/">
        <span class="logo-icon">🖼</span>
        <span>Image Bed</span>
      </a>
      <span class="stat" id="stat"></span>
    </div>
  </header>

  <nav class="breadcrumb" id="breadcrumb"></nav>

  <main class="content" id="content">
    <div id="loading" class="loading"><div class="spinner"></div><p>正在扫描仓库…</p></div>
  </main>

  <div class="lb" id="lb">
    <button class="lb-close" id="lbClose" title="关闭">✕</button>
    <button class="lb-nav prev" id="lbPrev" title="上一张">‹</button>
    <button class="lb-nav next" id="lbNext" title="下一张">›</button>
    <img id="lbImg" src="" alt="">
    <div class="lb-bar">
      <span class="fname" id="lbName"></span>
      <span class="lb-url" id="lbUrl"></span>
      <button class="lb-btn" id="lbCopy">复制链接</button>
      <button class="lb-btn" id="lbCopyMd">复制 MD</button>
    </div>
  </div>

  <div class="toast" id="toast">已复制 ✓</div>

  <script>
    (() => {
      /* ════════════════════════════════════════════════
       *  ↓↓↓  只需改这里  ↓↓↓
       * ════════════════════════════════════════════════ */
      const OWNER    = 'furina315';       // ← GitHub 用户名
      const REPO     = 'imgbed';          // ← 仓库名
      const CDN_BASE = '';                // ← 复制链接时用的域名前缀
      /* ────────────────────────────────────────────────
       *  CDN_BASE 用于「复制链接」功能，示例:
       *   EdgeOne:   'https://img.yourdomain.com'
       *   留空 '' :   自动用当前页面域名
       *
       *  ⚡ 图片展示始终用相对路径加载（同域），
       *     EdgeOne 自然会缓存所有图片请求！
       * ──────────────────────────────────────────────── */

      const REPO_FULL = `${OWNER}/${REPO}`;
      const IMG_EXTS = /\.(png|jpe?g|gif|webp|svg|bmp|ico|avif)$/i;
      const IGNORE = /^(\.|_|node_modules|CNAME)/;

      // ── State ──
      let allFiles = [];
      let tree = {};
      let currentImages = [];
      let lbIndex = -1;

      const $ = id => document.getElementById(id);
      const content = $('content'), breadcrumb = $('breadcrumb');
      const lb = $('lb'), lbImg = $('lbImg'), lbName = $('lbName'), lbUrl = $('lbUrl');
      const toast = $('toast');

      // ── URL builders ──
      // 页面展示用：相对路径，走当前域名 → 经过 EdgeOne → 被缓存
      function localUrl(path) {
        return `./${path}`;
      }
      // 复制给别人用：完整的外部链接
      function copyUrl(path) {
        if (CDN_BASE) return `${CDN_BASE}/${path}`;
        return `${location.origin}/${path}`;
      }

      // ── Init: fetch repo tree ──
      (async () => {
        try {
          let data;
          const r1 = await fetch(`https://api.github.com/repos/${REPO_FULL}/git/trees/main?recursive=1`);
          if (r1.ok) { data = await r1.json(); }
          else {
            const r2 = await fetch(`https://api.github.com/repos/${REPO_FULL}/git/trees/master?recursive=1`);
            if (!r2.ok) throw new Error('仓库不存在或无权访问');
            data = await r2.json();
          }
          processTree(data);
        } catch (e) {
          content.innerHTML = `<div class="empty"><div class="icon">😵</div><h2>加载失败</h2><p>${e.message}</p></div>`;
        }
      })();

      function processTree(data) {
        allFiles = (data.tree || [])
          .filter(f => f.type === 'blob' && IMG_EXTS.test(f.path))
          .filter(f => !f.path.split('/').some(s => IGNORE.test(s)))
          .map(f => {
            const parts = f.path.split('/');
            return { name: parts[parts.length - 1], path: f.path, dir: parts.slice(0, -1).join('/') };
          });

        // Build nested tree structure
        tree = { __files: [] };
        allFiles.forEach(f => {
          const segs = f.dir ? f.dir.split('/') : [];
          let node = tree;
          segs.forEach(s => {
            if (!node[s]) node[s] = { __files: [] };
            node = node[s];
          });
          node.__files.push(f);
        });

        $('stat').innerHTML = `共 <b>${allFiles.length}</b> 张图片`;

        // Route
        window.addEventListener('hashchange', route);
        route();
      }

      // ── Router ──
      function route() {
        let hash = decodeURIComponent(location.hash.replace(/^#\/?/, ''));
        if (hash.endsWith('/')) hash = hash.slice(0, -1);

        // Check if it's an image path
        if (hash && IMG_EXTS.test(hash)) {
          // Find the image and open lightbox
          const dir = hash.split('/').slice(0, -1).join('/');
          renderDir(dir);
          const idx = currentImages.findIndex(img => img.path === hash);
          if (idx >= 0) openLightbox(idx);
          return;
        }

        renderDir(hash);
      }

      // ── Render directory ──
      function renderDir(dirPath) {
        // Navigate tree
        let node = tree;
        if (dirPath) {
          const segs = dirPath.split('/');
          for (const s of segs) {
            if (!node[s]) { content.innerHTML = `<div class="empty"><div class="icon">📭</div><h2>目录不存在</h2></div>`; return; }
            node = node[s];
          }
        }

        // Breadcrumb
        buildBreadcrumb(dirPath);

        // Sub-folders
        const subDirs = Object.keys(node).filter(k => k !== '__files').sort();
        // Images in this dir
        const imgs = node.__files || [];
        currentImages = imgs;

        let html = '';

        // Folders
        if (subDirs.length) {
          html += '<div class="folder-list">';
          subDirs.forEach(name => {
            const fullPath = dirPath ? `${dirPath}/${name}` : name;
            const count = countImages(node[name]);
            html += `<a class="folder-card" href="#/${fullPath}/">
              <span class="f-icon">📁</span>
              <div class="f-info">
                <div class="f-name">${name}</div>
                <div class="f-count">${count} 张图片</div>
              </div>
            </a>`;
          });
          html += '</div>';
        }

        // Images
        if (imgs.length) {
          html += '<div class="image-grid">';
          imgs.forEach((img, i) => {
            const src = localUrl(img.path);   // 相对路径 → 走 EO 缓存
            const link = copyUrl(img.path);   // 完整链接 → 给复制用
            html += `<div class="img-card" data-idx="${i}">
              <div class="thumb">
                <img src="${src}" alt="${img.name}" loading="lazy">
              </div>
              <div class="info">
                <span class="name" title="${img.path}">${img.name}</span>
                <div class="acts">
                  <button class="btn-i" data-act="link" data-url="${link}" title="复制链接">
                    <svg width="13" height="13" viewBox="0 0 16 16" fill="currentColor"><path d="M0 6.75C0 5.784.784 5 1.75 5h1.5a.75.75 0 0 1 0 1.5h-1.5a.25.25 0 0 0-.25.25v7.5c0 .138.112.25.25.25h7.5a.25.25 0 0 0 .25-.25v-1.5a.75.75 0 0 1 1.5 0v1.5A1.75 1.75 0 0 1 9.25 16h-7.5A1.75 1.75 0 0 1 0 14.25Z"/><path d="M5 1.75C5 .784 5.784 0 6.75 0h7.5C15.216 0 16 .784 16 1.75v7.5A1.75 1.75 0 0 1 14.25 11h-7.5A1.75 1.75 0 0 1 5 9.25Zm1.75-.25a.25.25 0 0 0-.25.25v7.5c0 .138.112.25.25.25h7.5a.25.25 0 0 0 .25-.25v-7.5a.25.25 0 0 0-.25-.25Z"/></svg>
                  </button>
                  <button class="btn-i" data-act="md" data-url="${link}" data-name="${img.name}" title="复制 MD">
                    <svg width="13" height="13" viewBox="0 0 16 16" fill="currentColor"><path d="M14.85 3H1.15C.52 3 0 3.52 0 4.15v7.69C0 12.48.52 13 1.15 13h13.69c.64 0 1.15-.52 1.15-1.15V4.15C16 3.52 15.48 3 14.85 3ZM9 11H7V8L5.5 9.92 4 8v3H2V5h2l1.5 2L7 5h2Zm2.99.5L9.5 8H11V5h2v3h1.5Z"/></svg>
                  </button>
                </div>
              </div>
            </div>`;
          });
          html += '</div>';
        }

        if (!subDirs.length && !imgs.length) {
          html = '<div class="empty"><div class="icon">📭</div><h2>这里还没有图片</h2><p>上传一些图片到这个目录后刷新页面即可。</p></div>';
        }

        content.innerHTML = html;

        // Bind image card events
        content.querySelectorAll('.img-card').forEach(card => {
          card.querySelector('.thumb').addEventListener('click', () => {
            const idx = parseInt(card.dataset.idx);
            // Update hash to image path
            location.hash = `/${currentImages[idx].path}`;
          });
          card.querySelectorAll('[data-act]').forEach(btn => {
            btn.addEventListener('click', e => {
              e.stopPropagation();
              const txt = btn.dataset.act === 'md'
                ? `![${btn.dataset.name}](${btn.dataset.url})`
                : btn.dataset.url;
              copy(txt);
              btn.classList.add('copied');
              setTimeout(() => btn.classList.remove('copied'), 1500);
            });
          });
        });
      }

      function countImages(node) {
        let n = (node.__files || []).length;
        Object.keys(node).filter(k => k !== '__files').forEach(k => n += countImages(node[k]));
        return n;
      }

      // ── Breadcrumb ──
      function buildBreadcrumb(dirPath) {
        let html = `<a class="bc-item" href="#/">🏠 根目录</a>`;
        if (dirPath) {
          const segs = dirPath.split('/');
          segs.forEach((seg, i) => {
            const path = segs.slice(0, i + 1).join('/');
            html += `<span class="bc-sep">›</span>`;
            if (i === segs.length - 1) {
              html += `<span class="bc-item current">${seg}</span>`;
            } else {
              html += `<a class="bc-item" href="#/${path}/">${seg}</a>`;
            }
          });
        }
        breadcrumb.innerHTML = html;
      }

      // ── Lightbox ──
      function openLightbox(idx) {
        lbIndex = idx;
        showLbImage();
        lb.classList.add('active');
        document.body.style.overflow = 'hidden';
      }
      function closeLightbox() {
        lb.classList.remove('active');
        document.body.style.overflow = '';
        setTimeout(() => { lbImg.src = ''; }, 300);
        // 回到目录，用 replaceState 避免触发 hashchange 重渲页面
        const img = currentImages[lbIndex];
        if (img) {
          const dirHash = img.dir ? `#/${img.dir}/` : '#/';
          history.replaceState(null, '', dirHash);
        }
      }
      function showLbImage() {
        const img = currentImages[lbIndex];
        lbImg.src = localUrl(img.path);       // 相对路径 → 走 EO
        lbName.textContent = img.name;
        lbUrl.textContent = copyUrl(img.path); // 展示完整链接
      }
      function navLb(d) {
        if (!currentImages.length) return;
        lbIndex = (lbIndex + d + currentImages.length) % currentImages.length;
        showLbImage();
        // Update hash silently
        history.replaceState(null, '', `#/${currentImages[lbIndex].path}`);
      }

      $('lbClose').addEventListener('click', closeLightbox);
      $('lbPrev').addEventListener('click', () => navLb(-1));
      $('lbNext').addEventListener('click', () => navLb(1));
      $('lbCopy').addEventListener('click', () => {
        copy(copyUrl(currentImages[lbIndex].path));
        flash($('lbCopy'), '已复制 ✓', '复制链接');
      });
      $('lbCopyMd').addEventListener('click', () => {
        const img = currentImages[lbIndex];
        copy(`![${img.name}](${copyUrl(img.path)})`);
        flash($('lbCopyMd'), '已复制 ✓', '复制 MD');
      });
      lb.addEventListener('click', e => { if (e.target === lb) closeLightbox(); });
      document.addEventListener('keydown', e => {
        if (!lb.classList.contains('active')) return;
        if (e.key === 'Escape') closeLightbox();
        if (e.key === 'ArrowLeft') navLb(-1);
        if (e.key === 'ArrowRight') navLb(1);
      });

      // ── Utils ──
      function copy(t) { navigator.clipboard.writeText(t).then(() => { toast.classList.add('show'); setTimeout(() => toast.classList.remove('show'), 2000); }); }
      function flash(btn, a, b) { btn.textContent = a; btn.classList.add('copied'); setTimeout(() => { btn.textContent = b; btn.classList.remove('copied'); }, 1500); }
    })();
  </script>
</body>
</html>
